[colors]
transparent    = #00000000
background     = #151515
background-alt = #1E1E2E
foreground     = #e8e8e8
red            = #cf6a4c
green          = #799d6a
yellow         = #ffb964
blue           = #8197bf

;  ____               _
; | __ )  __ _ _ __  / |
; |  _ \ / _` | '__| | |
; | |_) | (_| | |    | |
; |____/ \__,_|_|    |_|
;

[bar/bar1]
width          = 100%
height         = 2%
;radius        = 10
;dpi           = 96
fixed-center   = true

background     = ${colors.background}
foreground     = ${colors.foreground}

line-size      = 3pt

;border-size   = 3pt
border-color   = #00000000

padding-left   = 1
padding-right  = 1

module-margin  = 1

font-0         = IosevkaTermNerdFontMono;3

modules-left   = custom-menu xworkspaces xwindow
modules-center = date
modules-right  = pulseaudio cpu memory wireless-network updates xkeyboard

cursor-click   = pointer
cursor-scroll  = ns-resize

enable-ipc     = true

;separator = |
;separator-foreground = ${colors.foreground}

;  ____       _   _   _
; / ___|  ___| |_| |_(_)_ __   __ _ ___
; \___ \ / _ \ __| __| | '_ \ / _` / __|
;  ___) |  __/ |_| |_| | | | | (_| \__ \
; |____/ \___|\__|\__|_|_| |_|\__, |___/
;                             |___/

[settings]
screenchange-reload = true
pseudo-transparency = true

;  __  __           _       _
; |  \/  | ___   __| |_   _| | ___  ___
; | |\/| |/ _ \ / _` | | | | |/ _ \/ __|
; | |  | | (_) | (_| | |_| | |  __/\__ \
; |_|  |_|\___/ \__,_|\__,_|_|\___||___/
;

[module/custom-menu]
type                          = custom/text

format                        = 
format-foreground             = ${colors.blue}
format-padding                = 1

click-left                    = "rofi -show run"
click-right                   = "${HOME}/.config/rofi/scripts/powermenu.sh"

[module/xworkspaces]
type                          = internal/xworkspaces

label-active                  = %name%
label-active-background       = ${colors.background-alt}
label-active-underline        = ${colors.red}
label-active-padding          = 1

label-occupied                = %name%
label-occupied-padding        = 1

label-urgent                  = %name%
label-urgent-background       = ${colors.background-alt}
label-urgent-padding          = 1

label-empty                   = %name%
label-empty-foreground        = ${colors.foreground}
label-empty-padding           = 1

[module/xwindow]
type                          = internal/xwindow
label                         = %title:0:60:...%

[module/date]
type                          = internal/date
interval                      = 1

date                          = %h %d.%m.%Y %H:%M
date-alt                      = %A, %h %d.%m.%Y %H:%M:%S

label                         = %date%
label-foreground              = ${colors.foreground}

[module/pulseaudio]
type                          = internal/pulseaudio

use-ui-max                    = false

interval                      = 5

format-volume-foreground      = ${colors.red}
format-volume                 = <ramp-volume> <label-volume>

label-volume                  = %percentage%%

ramp-volume-0                 = 
ramp-volume-1                 = 
ramp-volume-2                 = 

label-muted                   = 󰝟 muted
label-muted-foreground        = ${colors.red}

click-right                   = "pavucontrol"

[module/cpu]
type                          = internal/cpu
interval                      = 2
format-foreground             = ${colors.yellow}
label                         =  %percentage%%

[module/memory]
type                          = internal/memory
interval                      = 2
format-foreground             = ${colors.yellow}
label                         =  %gb_used%

[module/wireless-network]
type = internal/network
interface = wlan0

format-connected-foreground = ${colors.blue}
label-connected = 󰕒 %upspeed% 󰇚 %downspeed%

[module/xkeyboard]
type = internal/xkeyboard
label-layout = %name%

[module/updates]
type = custom/script
exec = ${HOME}/.local/share/bin/update.sh -c
exec-if = ${HOME}/.local/share/bin/update.sh -a
interval = 600
format = <label>
format-prefix = "󰚰  "
format-foreground = ${colors.green}
label = %output% Updates
click-left = kitty -e ${HOME}/.local/share/bin/update.sh

